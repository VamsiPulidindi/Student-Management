apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        image: vamsiv22/student-management-flask:v1

        ports:
        - containerPort: 5000

        env:
        - name: DB_HOST
          value: mysql

        - name: DB_USER
          value: root

        - name: DB_PASSWORD
          value: root123